# Fire configuration
#
# Read once at startup. Fire writes this commented template the first time it runs (only if the
# file is missing) and never modifies it afterward — your edits are safe. Delete the file to
# regenerate this template. Invalid TOML or unknown keys fall back to the built-in defaults, so a
# typo can never stop Fire from launching.
#
# Location: %APPDATA%\fire\config.toml
# Format:   TOML (https://toml.io)

# ----------------------------------------------------------------------------------------------
# instance-mode — how a newly launched Fire relates to one that is already open.
#
#   "new-window"      (default) Every image you open gets its own independent window. Nothing
#                     stays resident in the background.
#   "single-instance" Keep a single Fire window; opening another image reuses that window
#                     (the picture swaps in) instead of spawning a new one.
#
# instance-mode = "new-window"

# ----------------------------------------------------------------------------------------------
# hot-reload — automatically re-decode the displayed image when its file changes on disk.
#
#   true   (default) Watch the open file and refresh the view when it is re-saved.
#   false  Disable the file watch entirely.
#
# hot-reload = true

# ----------------------------------------------------------------------------------------------
# fit-upscale — whether the explicit "fit to window" command (the F key / toolbar button) also
#               scales images smaller than the window up to fill it.
#
#   true   (default) Fit fills the window: a small image is enlarged to fill it, a large one is
#                    shrunk to fit. Pressing F reflows to the window at any image size.
#   false  Cap the fit command at native 1:1 (the texture-viewer convention) — F only shrinks
#                    oversized images and never upscales. Zoom in explicitly to go past 100%.
#
# Note: images always *open* fitted without upscaling, regardless of this setting — a picture
# larger than the window opens scaled to fit, a smaller one opens at 100%. This key only changes
# what the explicit fit command does afterward.
#
# fit-upscale = true

# ----------------------------------------------------------------------------------------------
# [[open-with]] — entries for the "Open in…" button on the toolbar (the rightmost button) and the
#                 right-click menu over the image. Each [[open-with]] block adds one entry. With no
#                 entries configured the button is disabled (greyed out).
#
# An entry is either a LEAF that launches a program, or a SUBMENU that nests further entries.
#
# Leaf fields:
#   name   Required. The label shown in the menu (e.g. "Photoshop").
#   path   Required. Full path to the program's .exe. Backslashes must be doubled in a normal
#          TOML string ("C:\\Program Files\\..."), or use a single-quoted literal ('C:\...').
#   args   Optional. The command-line arguments. The token {path} is replaced with the full path
#          of the image currently open in Fire. If you omit args, Fire passes just the image path
#          as the single argument (args = ["{path}"]).
#
# Submenu fields:
#   name   Required. The label shown for the submenu.
#   items  Required. The child entries, written as [[open-with.items]] blocks. Each child is itself
#          a leaf or a submenu, so submenus can nest to any depth ([[open-with.items.items]], …).
#          An entry with `items` is always a submenu; any `path`/`args` on it are ignored.
#
# Leaf examples (uncomment and edit the paths to match your machine):
#
# [[open-with]]
# name = "Photoshop"
# path = 'C:\Program Files\Adobe\Adobe Photoshop 2024\Photoshop.exe'
# args = ["{path}"]
#
# [[open-with]]
# name = "Paint.NET"
# path = 'C:\Program Files\paint.net\paintdotnet.exe'
#
# [[open-with]]
# name = "Show in folder"
# path = 'C:\Windows\explorer.exe'
# args = ["/select,", "{path}"]
#
# Submenu example — "Open in" grouping three editors, then an "ImageMagick" submenu with nested
# "Convert" and "Rotate" submenus. Note how the indentation mirrors the table-path nesting; the
# whitespace is cosmetic, what matters is the dotted [[open-with.items.items]] paths.
#
# [[open-with]]
# name = "Open in"
#   [[open-with.items]]
#   name = "Photoshop"
#   path = 'C:\Program Files\Adobe\Adobe Photoshop 2024\Photoshop.exe'
#   [[open-with.items]]
#   name = "XnView"
#   path = 'C:\Program Files\XnView\xnview.exe'
#   [[open-with.items]]
#   name = "Paint.NET"
#   path = 'C:\Program Files\paint.net\paintdotnet.exe'
#
# [[open-with]]
# name = "ImageMagick"
#   [[open-with.items]]
#   name = "Convert"
#     [[open-with.items.items]]
#     name = "JPG"
#     path = 'C:\Program Files\ImageMagick\magick.exe'
#     args = ["{path}", "{path}.jpg"]
#     [[open-with.items.items]]
#     name = "PNG"
#     path = 'C:\Program Files\ImageMagick\magick.exe'
#     args = ["{path}", "{path}.png"]
#     [[open-with.items.items]]
#     name = "TGA"
#     path = 'C:\Program Files\ImageMagick\magick.exe'
#     args = ["{path}", "{path}.tga"]
#   [[open-with.items]]
#   name = "Rotate"
#     [[open-with.items.items]]
#     name = "90° clockwise"
#     path = 'C:\Program Files\ImageMagick\magick.exe'
#     args = ["{path}", "-rotate", "90", "{path}"]
#     [[open-with.items.items]]
#     name = "90° anti-clockwise"
#     path = 'C:\Program Files\ImageMagick\magick.exe'
#     args = ["{path}", "-rotate", "-90", "{path}"]
