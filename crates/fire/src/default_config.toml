# Fire configuration
#
# Read once at startup. Fire writes this commented template the first time it runs (only if the
# file is missing) and never modifies it on its own. Invalid TOML or unknown keys fall back to the
# built-in defaults, so a typo can never stop Fire from launching. Delete the file to regenerate
# this template.
#
# Every key below is also editable in the app: Settings… (the gear on the toolbar, or the
# right-click menu). NOTE that saving from the Settings dialog rewrites this file from Fire's own
# state, which does not preserve comments — so if you hand-edit and want to keep your notes, avoid
# saving from the dialog afterward (or keep a copy).
#
# Location: %APPDATA%\fire\config.toml
# Format:   TOML (https://toml.io)

# ----------------------------------------------------------------------------------------------
# instance-mode — how a newly launched Fire relates to one that is already open.
#
#   "new-window"      (default) Every image you open gets its own independent window. Nothing
#                     stays resident in the background.
#   "single-instance" Keep a single Fire window; opening another image reuses that window
#                     (the picture swaps in) instead of spawning a new one.
#
# instance-mode = "new-window"

# ----------------------------------------------------------------------------------------------
# hot-reload — automatically re-decode the displayed image when its file changes on disk.
#
#   true   (default) Watch the open file and refresh the view when it is re-saved.
#   false  Disable the file watch entirely.
#
# hot-reload = true

# ----------------------------------------------------------------------------------------------
# fit-upscale — whether the explicit "fit to window" command (the F key / toolbar button) also
#               scales images smaller than the window up to fill it.
#
#   true   (default) Fit fills the window: a small image is enlarged to fill it, a large one is
#                    shrunk to fit. Pressing F reflows to the window at any image size.
#   false  Cap the fit command at native 1:1 (the texture-viewer convention) — F only shrinks
#                    oversized images and never upscales. Zoom in explicitly to go past 100%.
#
# Note: images always *open* fitted without upscaling, regardless of this setting — a picture
# larger than the window opens scaled to fit, a smaller one opens at 100%. This key only changes
# what the explicit fit command does afterward.
#
# fit-upscale = true

# ----------------------------------------------------------------------------------------------
# default-fit — how an image is scaled when it OPENS (a fresh open, ←/→ folder navigation, or a
#               hot-reload that changed the image's dimensions).
#
#   "fit"          (default) Shrink an oversized image to fit the window; show a smaller one at
#                  native 1:1. Nothing is ever enlarged on open.
#   "actual-size"  Always open at 100%, however large the image — pan to explore it.
#
# default-fit = "fit"

# ----------------------------------------------------------------------------------------------
# background — the viewport backdrop: it fills the letterbox around the image and shows through
#              transparent pixels. (The toolbar's background buttons override this for the session.)
#
#   "auto"     (default) Per image: a checkerboard when the image really has transparency,
#              solid black otherwise.
#   "black"    Always solid black.
#   "white"    Always solid white.
#   "grey"     Always neutral 40% grey.
#   "checker"  Always the light/dark transparency checkerboard.
#
# background = "auto"

# ----------------------------------------------------------------------------------------------
# default-tonemap — the tonemap operator a freshly opened HDR image (EXR / HDR / float) starts on.
#                   The T key still toggles between the two at any time.
#
#   "reinhard"  (default) Gentle, filmic-neutral roll-off.
#   "aces"      Punchier, contrastier ACES-style curve.
#
# default-tonemap = "reinhard"

# ----------------------------------------------------------------------------------------------
# zoom-step / exposure-step — how far one input step moves the view.
#
#   zoom-step      Multiplicative zoom per wheel notch (and per = / - press). 1.15 = +15% per
#                  notch. Range 1.01 – 4.0; larger is coarser/faster.
#   exposure-step  Exposure change per [ or ] press on an HDR image, in stops. Range 0.01 – 4.0.
#
# zoom-step = 1.15
# exposure-step = 0.25

# ----------------------------------------------------------------------------------------------
# [flipbook] — sprite-sheet playback mode (the K key / toolbar button). These are the DEFAULTS a
#              newly enabled flipbook adopts; the transport band under the image edits the live
#              one, and each image keeps its own settings for the session.
#
#   fps          Playback rate a new flipbook starts at. Range 0.1 – 120. Default 24.
#   blend        Crossfade consecutive frames. Default false.
#   autoplay     Start playing on enter (false parks it on frame 0). Default true.
#   auto-detect  Scan each decoded image for a sprite-sheet grid and offer the hint chip when one
#                is found. Default true. Setting this to false stops the scan entirely — flipbook
#                mode still works by hand (K), it just isn't suggested.
#
# [flipbook]
# fps = 24.0
# blend = false
# autoplay = true
# auto-detect = true

# ----------------------------------------------------------------------------------------------
# [context-menu] — which of the fixed items appear in the right-click menu over the image (and in
#                  the toolbar's actions menu). Set one to false to hide it. The configurable
#                  "Open in…" entries below are separate ([[open-with]]).
#
# [context-menu]
# show-in-explorer = true
# copy-file = true
# copy-path = true
# copy-file-name = true

# ----------------------------------------------------------------------------------------------
# [octagon] — the octagon overlay (the octagon button on the toolbar): Unity VFX Graph's octagon
#             particle shape drawn over the image, so you can see how a texture would be clipped.
#             The overlay itself always starts switched OFF; these keys only govern its options.
#
#   remember      Persist the options below across launches (saved when Fire closes). Default
#                 false: the options reset to the defaults every launch and nothing is written back.
#   color         Line color: "red" (default), "green", "blue", "white" or "black".
#   line-opacity  Opacity of the octagon's lines, 0.0 – 1.0. Default 1.0 (solid).
#   crop          Crop factor, 0.0 – 0.5: 0 = the full quad, 0.5 = the diamond. Default 0.25.
#   hide          How much the image outside the octagon fades toward the backdrop, 0.0 – 1.0.
#                 Default 0.0 (fully visible).
#
# [octagon]
# remember = false
# color = "red"
# line-opacity = 1.0
# crop = 0.25
# hide = 0.0

# ----------------------------------------------------------------------------------------------
# [keybinds] — keyboard shortcuts. Easiest edited in Settings ▸ Keybinds, but you can write them
#              here too. Only the ones you CHANGE are listed: anything absent keeps its default (so
#              you also pick up any new defaults a future version ships).
#
# Write a key as "F", "F11", "Left", "Esc", "Space", "[", "Num+", or with modifiers:
# "Ctrl+F", "Ctrl+Alt+Shift+K". Give a list to bind several keys to one action. An empty string
# unbinds an action entirely. An unknown action name or an unreadable key is simply ignored.
#
# Action names and their defaults:
#   fit = "F"                          actual-size = "1"
#   zoom-in = ["=", "Shift+=", "Num+"] zoom-out = ["-", "Num-"]
#   all-channels = "C"                 red-channel = "R"
#   green-channel = "G"                blue-channel = "B"
#   alpha-channel = "A"                toggle-tonemap = "T"
#   exposure-up = "]"                  exposure-down = "["
#   exposure-reset = ""                toggle-outline = ""      (both unbound by default)
#   previous-image = "Left"            next-image = "Right"
#   toggle-fullscreen = "F11"          close-or-exit-fullscreen = "Esc"
#   toggle-flipbook = "K"
#   flipbook-play-pause = "Space"      (these three act only in flipbook mode)
#   flipbook-previous-frame = ","      flipbook-next-frame = "."
#
# [keybinds]
# toggle-flipbook = "Ctrl+K"
# exposure-reset = "0"

# ----------------------------------------------------------------------------------------------
# [[open-with]] — entries for the "Open in…" button on the toolbar (the rightmost button) and the
#                 right-click menu over the image. Each [[open-with]] block adds one entry. With no
#                 entries configured the button is disabled (greyed out).
#
# An entry is either a LEAF that launches a program, or a SUBMENU that nests further entries.
#
# Leaf fields:
#   name   Required. The label shown in the menu (e.g. "Photoshop").
#   path   Required. Full path to the program's .exe. Backslashes must be doubled in a normal
#          TOML string ("C:\\Program Files\\..."), or use a single-quoted literal ('C:\...').
#   args   Optional. The command-line arguments. The token {path} is replaced with the full path
#          of the image currently open in Fire. If you omit args, Fire passes just the image path
#          as the single argument (args = ["{path}"]).
#
# Submenu fields:
#   name   Required. The label shown for the submenu.
#   items  Required. The child entries, written as [[open-with.items]] blocks. Each child is itself
#          a leaf or a submenu, so submenus can nest to any depth ([[open-with.items.items]], …).
#          An entry with `items` is always a submenu; any `path`/`args` on it are ignored.
#
# Leaf examples (uncomment and edit the paths to match your machine):
#
# [[open-with]]
# name = "Photoshop"
# path = 'C:\Program Files\Adobe\Adobe Photoshop 2024\Photoshop.exe'
# args = ["{path}"]
#
# [[open-with]]
# name = "Paint.NET"
# path = 'C:\Program Files\paint.net\paintdotnet.exe'
#
# [[open-with]]
# name = "Show in folder"
# path = 'C:\Windows\explorer.exe'
# args = ["/select,", "{path}"]
#
# Submenu example — "Open in" grouping three editors, then an "ImageMagick" submenu with nested
# "Convert" and "Rotate" submenus. Note how the indentation mirrors the table-path nesting; the
# whitespace is cosmetic, what matters is the dotted [[open-with.items.items]] paths.
#
# [[open-with]]
# name = "Open in"
#   [[open-with.items]]
#   name = "Photoshop"
#   path = 'C:\Program Files\Adobe\Adobe Photoshop 2024\Photoshop.exe'
#   [[open-with.items]]
#   name = "XnView"
#   path = 'C:\Program Files\XnView\xnview.exe'
#   [[open-with.items]]
#   name = "Paint.NET"
#   path = 'C:\Program Files\paint.net\paintdotnet.exe'
#
# [[open-with]]
# name = "ImageMagick"
#   [[open-with.items]]
#   name = "Convert"
#     [[open-with.items.items]]
#     name = "JPG"
#     path = 'C:\Program Files\ImageMagick\magick.exe'
#     args = ["{path}", "{path}.jpg"]
#     [[open-with.items.items]]
#     name = "PNG"
#     path = 'C:\Program Files\ImageMagick\magick.exe'
#     args = ["{path}", "{path}.png"]
#     [[open-with.items.items]]
#     name = "TGA"
#     path = 'C:\Program Files\ImageMagick\magick.exe'
#     args = ["{path}", "{path}.tga"]
#   [[open-with.items]]
#   name = "Rotate"
#     [[open-with.items.items]]
#     name = "90° clockwise"
#     path = 'C:\Program Files\ImageMagick\magick.exe'
#     args = ["{path}", "-rotate", "90", "{path}"]
#     [[open-with.items.items]]
#     name = "90° anti-clockwise"
#     path = 'C:\Program Files\ImageMagick\magick.exe'
#     args = ["{path}", "-rotate", "-90", "{path}"]
